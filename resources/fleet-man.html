<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naval Tactical Evaluation Plotter</title>
    <style>
        :root {
            --bg-space: #0a0f1d;
            --panel-bg: #0f1526;
            --border-color: #1e294b;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.15);
            --guide-color: #f59e0b;
            --success: #10b981;
            --error: #ef4444;
            --accent: #a855f7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-space);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 440px;
            gap: 20px;
            width: 100%;
            max-width: 1300px;
        }

        .plotter-panel {
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            padding: 60px 20px;
            min-height: 500px;
        }

        .status-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--primary);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            z-index: 10;
            right: 20px;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            width: 500px;
            height: 500px;
            cursor: crosshair;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        .control-panel-form {
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 18px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        h2 {
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-tracker {
            font-size: 0.9rem;
            color: var(--guide-color);
            font-family: monospace;
        }

        .mission-box {
            background-color: rgba(56, 189, 248, 0.03);
            border: 1px dashed var(--primary);
            border-radius: 10px;
            padding: 16px;
            position: relative;
        }

        .mission-signal {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--guide-color);
            margin-top: 8px;
            letter-spacing: 1.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .maneuver-badge {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(168, 85, 247, 0.2);
            color: var(--accent);
            border: 1px solid var(--accent);
            text-transform: uppercase;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        select, input[type="number"] {
            width: 100%;
            background-color: var(--bg-space);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }

        select:focus, input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px var(--primary-glow);
        }

        .btn-action {
            background-color: var(--primary);
            color: var(--bg-space);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 50px;
        }

        .btn-action:hover {
            background-color: #5cd0ff;
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
        }

        .btn-inline-clear {
            position: absolute;
            bottom: 15px;
            right: 20px;
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid var(--error);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
        }

        .btn-inline-clear:hover {
            background: var(--error);
            color: #ffffff;
        }

        .feedback-box {
            border-radius: 10px;
            padding: 16px;
            font-size: 0.9rem;
            display: none;
            line-height: 1.5;
        }

        .feedback-box.pass {
            display: block;
            background-color: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: #d1fae5;
        }

        .feedback-box.fail {
            display: block;
            background-color: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: #fee2e2;
        }

        /* Custom Modal Overlay */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(7, 10, 19, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            padding: 30px;
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .modal-content h3 {
            font-size: 1.4rem;
            margin-bottom: 12px;
            color: var(--primary);
        }

        .modal-content p {
            font-size: 1rem;
            color: var(--text-main);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        .btn-modal {
            background-color: var(--primary);
            color: var(--bg-space);
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        @media (max-width: 950px) {
            .container {
                grid-template-columns: 1fr;
            }
            body {
                padding: 10px;
            }
            .plotter-panel {
                padding: 55px 5px 65px 5px;
                min-height: auto;
            }
            .canvas-container {
                width: 100%;
                max-width: 450px;
                height: auto;
                aspect-ratio: 1 / 1;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="plotter-panel">
        <div class="status-bar" id="plotterStatus">
            <span>Tap grid to plot initial setup...</span>
        </div>
        <div class="canvas-container" id="canvasContainer">
            <canvas id="tacticalCanvas" width="600" height="600"></canvas>
        </div>
        <button type="button" class="btn-inline-clear" id="clearBtn">Reset Plot</button>
    </div>

    <form class="control-panel-form" id="evalForm">
        <h2>
            Manuvering
            <span class="score-tracker" id="scoreDisplay">SCORE: 0/0</span>
        </h2>
        
        <div class="mission-box">
            <label>Operational Order Directive</label>
            <div style="font-size: 0.9rem; color: var(--text-main); margin-top: 6px; line-height: 1.4;" id="missionDesc">Loading tactical challenge...</div>
            <div class="mission-signal" id="missionSignal">
                <span id="signalText">--- ---</span>
                <span class="maneuver-badge" id="maneuverType">INIT</span>
            </div>
        </div>

        <hr style="border-color: var(--border-color);">

        <div class="form-group">
            <label for="ansHeading">Your Predicted Post-Maneuver Heading (°T)</label>
            <input type="number" id="ansHeading" name="ansHeading" min="0" max="359" placeholder="e.g. 090" required>
        </div>

        <div class="form-group">
            <label for="ansFormation">Your Predicted Final Formation Style</label>
            <select id="ansFormation" name="ansFormation" required>
                <option value="">-- Select Layout --</option>
                <option value="column">Column (Inline)</option>
                <option value="abreast">Line Abreast (Side-by-Side)</option>
                <option value="staggered">Staggered (FORM D Diamond/Divisional)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="ansGuide">Which Ship is the Post-Maneuver Guide?</label>
            <select id="ansGuide" name="ansGuide" required>
                <option value="">-- Select Hull Identifier --</option>
                <option value="1">Ship 1</option>
                <option value="2">Ship 2</option>
                <option value="3">Ship 3</option>
                <option value="4">Ship 4</option>
            </select>
        </div>

        <div class="feedback-box" id="feedbackBox"></div>

        <button type="submit" class="btn-action" id="submitBtn" disabled style="opacity: 0.5; cursor: not-allowed;">Submit Solutions for Review</button>
        <button type="button" class="btn-action" id="nextBtn" style="background-color: var(--panel-bg); color: var(--primary); border: 1px solid var(--primary); display:none;">Generate Next Problem</button>
    </form>
</div>

<!-- Custom Modal for User Feedback -->
<div class="modal" id="infoModal">
    <div class="modal-content">
        <h3 id="modalTitle">Plotting Evaluation</h3>
        <p id="modalBody">Body text...</p>
        <button type="button" class="btn-modal" onclick="closeModal()">Acknowledge</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('tacticalCanvas');
    const ctx = canvas.getContext('2d');
    const canvasContainer = document.getElementById('canvasContainer');
    const evalForm = document.getElementById('evalForm');
    const statusText = document.getElementById('plotterStatus');
    const submitBtn = document.getElementById('submitBtn');
    const nextBtn = document.getElementById('nextBtn');
    const feedbackBox = document.getElementById('feedbackBox');
    const clearBtn = document.getElementById('clearBtn');
    const scoreDisplay = document.getElementById('scoreDisplay');

    let currentTask = {};
    let plottedShips = [];
    const maxShips = 4;
    const center = 300;
    const radius = 240;

    let totalAttempts = 0;
    let successfulAttempts = 0;

    const cardinalBearings = [0, 45, 90, 135, 180, 225, 270, 315];

    // Comprehensive tactical scenario database (including regular FORM, FORM D, and CORPEN S)
    const testDirectives = [
        // Column Starts (Regular Maneuvers)
        { type: 'TURN', dir: 'STBD', amt: 90, initForm: 'column', initHead: 0,   label: 'TURN STBD 090', expectHead: 90,  expectForm: 'abreast', expectGuide: 1 },
        { type: 'TURN', dir: 'PORT', amt: 45, initForm: 'column', initHead: 180, label: 'TURN PORT 045', expectHead: 135, expectForm: 'abreast', expectGuide: 1 },
        { type: 'CORPEN', dir: 'STBD', amt: 45, initForm: 'column', initHead: 270, label: 'CORPEN STBD 045', expectHead: 315, expectForm: 'column',  expectGuide: 1 },
        { type: 'TURN', dir: 'STBD', amt: 180, initForm: 'column', initHead: 270, label: 'TURN 180',       expectHead: 90,  expectForm: 'column',  expectGuide: 1 },
        
        // Column Starts (Regular FORM)
        { type: 'FORM', dir: 'STBD', amt: 90, initForm: 'column', initHead: 90,  label: 'FORM 090',  expectHead: 90,  expectForm: 'abreast', expectGuide: 1 },
        { type: 'FORM', dir: 'PORT', amt: 0, initForm: 'column', initHead: 180, label: 'FORM 180', expectHead: 180, expectForm: 'abreast', expectGuide: 1 },
        { type: 'FORM', dir: 'STBD', amt: 270, initForm: 'column', initHead: 0, label: 'FORM 270', expectHead: 0, expectForm: 'abreast', expectGuide: 1 },

        // Line Abreast Starts (Regular Maneuvers)
        { type: 'TURN', dir: 'STBD', amt: 90, initForm: 'abreast', initHead: 90, label: 'TURN STBD 090', expectHead: 180, expectForm: 'column', expectGuide: 1 },
        { type: 'TURN', dir: 'PORT', amt: 90, initForm: 'abreast', initHead: 0, label: 'TURN PORT 090', expectHead: 270, expectForm: 'column', expectGuide: 1 },
        
        // Line Abreast Starts (Regular FORM)
        { type: 'FORM', dir: 'PORT', amt: 0, initForm: 'abreast', initHead: 180, label: 'FORM 180', expectHead: 180, expectForm: 'column', expectGuide: 1 },
        { type: 'FORM', dir: 'STBD', amt: 90, initForm: 'abreast', initHead: 270, label: 'FORM 270', expectHead: 270, expectForm: 'column', expectGuide: 1 },

        // Advanced: CORPEN S (Sequential Search Wheel)
        { type: 'CORPEN S', dir: 'STBD', amt: 90, initForm: 'column', initHead: 0, label: 'CORPEN S STBD 090', expectHead: 90, expectForm: 'column', expectGuide: 1 },
        { type: 'CORPEN S', dir: 'PORT', amt: 45, initForm: 'abreast', initHead: 270, label: 'CORPEN S PORT 045', expectHead: 225, expectForm: 'abreast', expectGuide: 1 },
        { type: 'CORPEN S', dir: 'STBD', amt: 135, initForm: 'column', initHead: 180, label: 'CORPEN S STBD 135', expectHead: 315, expectForm: 'column', expectGuide: 1 },

        // Advanced: FORM D (Staggered Diamond layout alignment on current base heading)
        { type: 'FORM D', dir: 'STBD', amt: 0, initForm: 'column', initHead: 90, label: 'FORM D STBD 090', expectHead: 90, expectForm: 'staggered', expectGuide: 1 },
        { type: 'FORM D', dir: 'PORT', amt: 0, initForm: 'abreast', initHead: 315, label: 'FORM D PORT 315', expectHead: 315, expectForm: 'staggered', expectGuide: 1 }
    ];

    function showModal(title, text) {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalBody').innerHTML = text;
        document.getElementById('infoModal').style.display = 'flex';
    }

    window.closeModal = function() {
        document.getElementById('infoModal').style.display = 'none';
    }

    function handleInputCoordinates(clientX, clientY) {
        if (plottedShips.length >= maxShips) return;

        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;

        const x = (clientX - rect.left) * scaleX;
        const y = (clientY - rect.top) * scaleY;

        plottedShips.push({
            id: plottedShips.length + 1,
            x: x,
            y: y,
            heading: currentTask.initHead,
            isGuide: plottedShips.length === 0
        });

        renderPlotter();
        updatePlotterStatus();
    }

    canvasContainer.addEventListener('click', (e) => {
        handleInputCoordinates(e.clientX, e.clientY);
    });

    canvasContainer.addEventListener('touchstart', (e) => {
        if(e.touches.length === 1) {
            e.preventDefault();
            handleInputCoordinates(e.touches[0].clientX, e.touches[0].clientY);
        }
    }, { passive: false });

    function generateScenario() {
        feedbackBox.style.display = "none";
        nextBtn.style.display = "none";
        submitBtn.style.display = "block";
        evalForm.reset();
        
        plottedShips = [];
        currentTask = testDirectives[Math.floor(Math.random() * testDirectives.length)];
        
        document.getElementById('missionDesc').textContent = `Plot 4 ships starting in a ${currentTask.initForm.toUpperCase()} heading ${String(currentTask.initHead).padStart(3, '0')}°T. Plot Ship 1 (Guide) first.`;
        document.getElementById('signalText').textContent = currentTask.label;
        document.getElementById('maneuverType').textContent = currentTask.type;
        
        updatePlotterStatus();
        renderPlotter();
    }

    function updatePlotterStatus() {
        if (plottedShips.length < maxShips) {
            statusText.innerHTML = `<span>Tap grid to plot <b>Ship ${plottedShips.length + 1}</b></span>`;
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.5";
            submitBtn.style.cursor = "not-allowed";
        } else {
            statusText.innerHTML = `<span style="color: #10b981">Initial Fleet Plotted. Input Predictions.</span>`;
            submitBtn.disabled = false;
            submitBtn.style.opacity = "1";
            submitBtn.style.cursor = "pointer";
        }
    }

    clearBtn.addEventListener('click', () => {
        plottedShips = [];
        renderPlotter();
        updatePlotterStatus();
    });

    function renderPlotter() {
        ctx.clearRect(0, 0, 600, 600);

        // 1. Draw Range Rings
        ctx.strokeStyle = '#111827';
        ctx.lineWidth = 1.5;
        for(let r = 60; r <= radius; r += 60) {
            ctx.beginPath();
            ctx.arc(center, center, r, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Radar Edge
        ctx.beginPath();
        ctx.arc(center, center, radius, 0, Math.PI * 2);
        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth = 2.5;
        ctx.stroke();

        // 2. Compass Markings
        ctx.fillStyle = '#475569';
        ctx.font = 'bold 12px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        cardinalBearings.forEach(angle => {
            let rad = (angle - 90) * Math.PI / 180;
            let x = center + (radius + 20) * Math.cos(rad);
            let y = center + (radius + 20) * Math.sin(rad);
            ctx.fillText(String(angle).padStart(3, '0'), x, y);
        });

        // 3. Render Ships (Replaced varColor lookups with direct hex color constants)
        plottedShips.forEach(ship => {
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate((ship.heading - 90) * Math.PI / 180);

            // Hull design
            ctx.fillStyle = ship.isGuide ? '#f59e0b' : '#38bdf8';
            ctx.beginPath();
            ctx.moveTo(15, 0);       
            ctx.lineTo(-7, -8);     
            ctx.lineTo(-11, 0);     
            ctx.lineTo(-7, 8);      
            ctx.closePath();
            ctx.fill();

            if (ship.isGuide) {
                ctx.strokeStyle = 'rgba(245, 158, 11, 0.5)';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.arc(0, 0, 18, 0, Math.PI * 2);
                ctx.stroke();
            }

            ctx.rotate(-(ship.heading - 90) * Math.PI / 180);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(ship.id, 0, -20);
            ctx.restore();
        });
    }

    // Mathematical verification engine to confirm if the user plotted their formation accurately
    function verifyPlottedFormation() {
        if (plottedShips.length < maxShips) return false;

        const dx = plottedShips[maxShips - 1].x - plottedShips[0].x;
        const dy = plottedShips[maxShips - 1].y - plottedShips[0].y;
        
        let plottedRad = Math.atan2(dy, dx);
        let plottedDeg = (plottedRad * 180 / Math.PI + 360) % 360;
        
        // Convert canvas degrees back to true compass bearing (0 = North, 90 = East)
        let truePlottedBearing = (plottedDeg + 90) % 360;

        const expectedBaseHeading = currentTask.initHead;
        let expectedLineBearing;

        if (currentTask.initForm === 'column') {
            expectedLineBearing = expectedBaseHeading;
        } else {
            expectedLineBearing = (expectedBaseHeading + 90) % 180; 
        }

        let diff = Math.abs((truePlottedBearing % 180) - (expectedLineBearing % 180));
        if (diff > 90) diff = 180 - diff;

        // Tolerant matching index window for mobile screen canvas adjustments
        return diff <= 28; 
    }

    evalForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const userHeading = parseInt(document.getElementById('ansHeading').value);
        const userForm = document.getElementById('ansFormation').value;
        const userGuide = parseInt(document.getElementById('ansGuide').value);

        let pass = true;
        let auditTrail = [];

        // 1. Verify Plot Accuracy
        const isPlotCorrect = verifyPlottedFormation();
        if (!isPlotCorrect) {
            pass = false;
            auditTrail.push(`❌ <b>Initial Plot Discrepancy:</b> Your plotted line layout did not align with a ${currentTask.initForm.toUpperCase()} starting heading of ${String(currentTask.initHead).padStart(3, '0')}°T.`);
        } else {
            auditTrail.push(`&nbsp; Initial Plotting coordinates verified successfully.`);
        }

        // 2. Verify Heading
        if (userHeading !== currentTask.expectHead) {
            pass = false;
            auditTrail.push(`❌ <b>Heading Deviation:</b> Expected final course is ${currentTask.expectHead}°T, but you predicted ${userHeading}°T.`);
        } else {
            auditTrail.push(`&nbsp; Final True Heading verified.`);
        }

        // 3. Verify Formation
        if (userForm !== currentTask.expectForm) {
            pass = false;
            auditTrail.push(`❌ <b>Formation Error:</b> Command structures a ${currentTask.expectForm.toUpperCase()} alignment.`);
        } else {
            auditTrail.push(`&nbsp; Fleet structural geometry verified.`);
        }

        // 4. Verify Guide
        if (userGuide !== currentTask.expectGuide) {
            pass = false;
            auditTrail.push(`❌ <b>Guide Assignment Error:</b> Post-maneuver operational guide is Ship ${currentTask.expectGuide}.`);
        } else {
            auditTrail.push(`&nbsp; Command Guide tracking verified.`);
        }

        totalAttempts++;
        if (pass) {
            successfulAttempts++;
            showModal("Maneuver Executed Successfully!", "<b>ALL SYSTEMS OPERATIONAL</b><br><br>The Fleet has correctly completed the tactical transformation without separation.");
        } else {
            showModal("Exercise Assessment Failed", "Your plot coordinates or operational variables did not pass review. Review corrections below.");
        }

        scoreDisplay.textContent = `SCORE: ${successfulAttempts}/${totalAttempts}`;

        feedbackBox.className = "feedback-box " + (pass ? "pass" : "fail");
        feedbackBox.innerHTML = (pass ? "<b>★ EXERCISE OUTCOME: PASS ★</b><br>Tactical translation coordinates matched perfectly." : "<b>⚠️ TACTICAL REVIEW BOARD LOGS:</b><br>") + "<br>" + auditTrail.join("<br>");
        feedbackBox.style.display = "block";

        // Animate simulation updates to showcase the completed maneuver visually
        let spacing = 45;
        let rad = (currentTask.expectHead - 90) * Math.PI / 180;
        let offset = (currentTask.expectForm === 'abreast') ? Math.PI / 2 : 0;

        plottedShips.forEach((ship, idx) => {
            if (currentTask.type === 'FORM' || currentTask.type === 'FORM D') {
                if(idx > 0) {
                    let layoutOffset = (currentTask.expectForm === 'staggered') ? (idx % 2 === 0 ? Math.PI/3 : -Math.PI/3) : offset;
                    ship.x = plottedShips[0].x + Math.cos(rad + layoutOffset) * (idx * spacing);
                    ship.y = plottedShips[0].y + Math.sin(rad + layoutOffset) * (idx * spacing);
                }
                ship.heading = currentTask.expectHead;
            } else if (currentTask.type === 'TURN') {
                ship.heading = currentTask.expectHead;
                if(idx > 0) {
                    let initRad = (currentTask.initHead - 90) * Math.PI / 180;
                    let startingOffset = (currentTask.initForm === 'abreast') ? Math.PI / 2 : 0;
                    ship.x = plottedShips[0].x + Math.cos(initRad + startingOffset) * (idx * spacing);
                    ship.y = plottedShips[0].y + Math.sin(initRad + startingOffset) * (idx * spacing);
                }
            } else { 
                // CORPEN / CORPEN S preserves initial spacing structure relative to axis heading rotation
                ship.heading = currentTask.expectHead;
                if(idx > 0) {
                    let finalSpacingOffset = (currentTask.expectForm === 'abreast') ? Math.PI / 2 : 0;
                    ship.x = plottedShips[0].x + Math.cos(rad + finalSpacingOffset) * (idx * spacing);
                    ship.y = plottedShips[0].y + Math.sin(rad + finalSpacingOffset) * (idx * spacing);
                }
            }
        });
        renderPlotter();

        submitBtn.style.display = "none";
        nextBtn.style.display = "block";
    });

    nextBtn.addEventListener('click', generateScenario);
    
    // Safety check to ensure initial canvas state loads perfectly
    window.onload = function() {
        generateScenario();
    };
</script>

</body>
</html>
