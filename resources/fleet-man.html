<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATP-01 Vol II Naval Tactical Trainer</title>
    <style>
        :root {
            --bg-space: #070a13;
            --panel-bg: #0f1526;
            --border-color: #1e294b;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.15);
            --guide-color: #f59e0b;
            --success: #10b981;
            --error: #ef4444;
            --accent: #a855f7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-space);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 450px;
            gap: 20px;
            width: 100%;
            max-width: 1300px;
        }

        .plotter-panel {
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            padding: 60px 20px;
            min-height: 580px;
        }

        .status-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            color: var(--primary);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1.5px;
            z-index: 10;
            right: 20px;
            display: flex;
            justify-content: space-between;
        }

        .canvas-container {
            position: relative;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, #0e172e 0%, #070a13 100%);
            border-radius: 50%;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: crosshair;
        }

        .control-panel-form {
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        h2 {
            font-size: 1.25rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-tracker {
            font-size: 0.9rem;
            color: var(--guide-color);
            font-family: monospace;
        }

        .mission-box {
            background-color: rgba(56, 189, 248, 0.03);
            border: 1px dashed var(--primary);
            border-radius: 10px;
            padding: 14px;
        }

        .mission-signal {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.7rem;
            font-weight: bold;
            color: var(--guide-color);
            margin-top: 8px;
            letter-spacing: 1.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .maneuver-badge {
            font-size: 0.75rem;
            padding: 3px 8px;
            border-radius: 4px;
            background: rgba(168, 85, 247, 0.2);
            color: var(--accent);
            border: 1px solid var(--accent);
            text-transform: uppercase;
        }

        .setup-config {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .override-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .override-toggle {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .override-toggle.active {
            color: var(--primary);
        }

        .override-toggle input {
            cursor: pointer;
        }

        .ship-selector-btn-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .ship-select-btn {
            background-color: var(--bg-space);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 6px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ship-select-btn.active {
            border-color: var(--primary);
            color: var(--primary);
            background-color: var(--primary-glow);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-inline-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        select, input[type="number"] {
            width: 100%;
            background-color: var(--bg-space);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 11px;
            border-radius: 8px;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }

        select:focus, input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px var(--primary-glow);
        }

        .btn-action {
            background-color: var(--primary);
            color: var(--bg-space);
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 50px;
        }

        .btn-action:hover {
            background-color: #5cd0ff;
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
        }

        .btn-inline-clear {
            position: absolute;
            bottom: 15px;
            right: 20px;
            background: rgba(239, 68, 68, 0.15);
            color: var(--error);
            border: 1px solid var(--error);
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
        }

        .btn-inline-clear:hover {
            background: var(--error);
            color: #ffffff;
        }

        .feedback-box {
            border-radius: 10px;
            padding: 14px;
            font-size: 0.85rem;
            display: none;
            line-height: 1.5;
            background: rgba(255,255,255,0.01);
            border: 1px solid var(--border-color);
        }

        .feedback-box.pass {
            display: block;
            background-color: rgba(16, 185, 129, 0.1);
            border-color: var(--success);
            color: #d1fae5;
        }

        .feedback-box.fail {
            display: block;
            background-color: rgba(239, 68, 68, 0.1);
            border-color: var(--error);
            color: #fee2e2;
        }

        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(7, 10, 19, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            padding: 30px;
            border-radius: 16px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        .btn-modal {
            background-color: var(--primary);
            color: var(--bg-space);
            padding: 10px 24px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        @media (max-width: 950px) {
            .container {
                grid-template-columns: 1fr;
            }
            body {
                padding: 10px;
            }
            .plotter-panel {
                padding: 55px 5px 65px 5px;
                min-height: auto;
            }
            .canvas-container {
                width: 100%;
                max-width: 450px;
                height: auto;
                aspect-ratio: 1 / 1;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="plotter-panel">
        <div class="status-bar" id="plotterStatus">
            <span>Tap grid to plot initial setup...</span>
        </div>
        <div class="canvas-container" id="canvasContainer">
            <canvas id="tacticalCanvas" width="600" height="600"></canvas>
        </div>
        <button type="button" class="btn-inline-clear" id="clearBtn">Reset Plot</button>
    </div>

    <form class="control-panel-form" id="evalForm">
        <h2>
            FLEET MANEUVRES
            <span class="score-tracker" id="scoreDisplay">SCORE: 0/0</span>
        </h2>
        
        <div class="mission-box">
            <label>Operational Order</label>
            <div style="font-size: 0.9rem; color: var(--text-main); margin-top: 6px; line-height: 1.4;" id="missionDesc">Generating Tactical Order...</div>
            <div class="mission-signal" id="missionSignal">
                <span id="signalText">--- ---</span>
                <span class="maneuver-badge" id="maneuverType">INIT</span>
            </div>
        </div>

        <div class="setup-config">
            <div class="override-row">
                <label>Plotting Control</label>
                <div class="override-toggle" id="overrideLabel">
                    <input type="checkbox" id="overrideToggle">
                    <span id="toggleText">Manual Designation Override</span>
                </div>
            </div>
            
            <div class="form-group" id="manualPlotterControls" style="display: none;">
                <label>Select Ship Designation To Place</label>
                <div class="ship-selector-btn-group">
                    <button type="button" class="ship-select-btn active" data-ship="1">Ship 1 (Lead/G)</button>
                    <button type="button" class="ship-select-btn" data-ship="2">Ship 2</button>
                    <button type="button" class="ship-select-btn" data-ship="3">Ship 3</button>
                    <button type="button" class="ship-select-btn" data-ship="4">Ship 4</button>
                </div>
            </div>
        </div>

        <hr style="border-color: var(--border-color);">

        <div class="form-group">
            <label for="ansHeading">Predicted Post-Maneuver Heading (°T)</label>
            <input type="number" id="ansHeading" name="ansHeading" min="0" max="359" placeholder="e.g. 090" required>
        </div>

        <div class="form-group">
            <label for="ansFormation">Predicted Final Formation Style</label>
            <select id="ansFormation" name="ansFormation" required>
                <option value="">-- Select Layout --</option>
                <option value="column">Column (Line Ahead)</option>
                <option value="abreast">Line Abreast (Side-by-Side)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="ansGuide">Which Ship is the Post-Maneuver Guide?</label>
            <select id="ansGuide" name="ansGuide" required>
                <option value="">-- Select Hull Identifier --</option>
                <option value="1">Ship 1 (Lead)</option>
                <option value="2">Ship 2</option>
                <option value="3">Ship 3</option>
                <option value="4">Ship 4</option>
            </select>
        </div>

        <div class="feedback-box" id="feedbackBox"></div>

        <button type="submit" class="btn-action" id="submitBtn" disabled style="opacity: 0.5;">Submit Solutions for Review</button>
        <button type="button" class="btn-action" id="nextBtn" style="background-color: var(--panel-bg); color: var(--primary); border: 1px solid var(--primary); display:none;">Generate Next Problem</button>
    </form>
</div>

<div class="modal" id="infoModal">
    <div class="modal-content">
        <h3 id="modalTitle">Plotting Evaluation</h3>
        <p id="modalBody" style="margin: 15px 0 25px 0; line-height: 1.5;"></p>
        <button type="button" class="btn-modal" onclick="closeModal()">Acknowledge</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('tacticalCanvas');
    const ctx = canvas.getContext('2d');
    const canvasContainer = document.getElementById('canvasContainer');
    const evalForm = document.getElementById('evalForm');
    const statusText = document.getElementById('plotterStatus');
    const submitBtn = document.getElementById('submitBtn');
    const nextBtn = document.getElementById('nextBtn');
    const feedbackBox = document.getElementById('feedbackBox');
    const clearBtn = document.getElementById('clearBtn');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const overrideToggle = document.getElementById('overrideToggle');
    const overrideLabel = document.getElementById('overrideLabel');
    const manualPlotterControls = document.getElementById('manualPlotterControls');
    const shipSelectBtns = document.querySelectorAll('.ship-select-btn');

    let currentTask = {};
    let plottedShips = [];
    const maxShips = 4;
    const center = 300;
    const radius = 240;

    let totalAttempts = 0;
    let successfulAttempts = 0;
    let selectedShipId = 1;

    const cardinalBearings = [0, 45, 90, 135, 180, 225, 270, 315];

    // True maneuvers matching ATP-01 signaling rules
    const testDirectives = [
        // TURN: simultanous, course changes, relative formation style flips on 90 degree turns
        { type: 'TURN', label: 'TURN STBD 090', initForm: 'column', initHead: 0, expectHead: 90, expectForm: 'abreast', expectGuide: 1 },
        { type: 'TURN', label: 'TURN PORT 090', initForm: 'column', initHead: 180, expectHead: 90, expectForm: 'abreast', expectGuide: 1 },
        { type: 'TURN', label: 'TURN PORT 045', initForm: 'column', initHead: 0, expectHead: 315, expectForm: 'column', expectGuide: 1 }, // Turn < 90 keeps relative column mostly intact 
        { type: 'TURN', label: 'TURN 180', initForm: 'column', initHead: 90, expectHead: 270, expectForm: 'column', expectGuide: 1 },

        // CORPEN: sequential wheel, course changes, formation style stays IDENTICAL
        { type: 'CORPEN', label: 'CORPEN PORT 270', initForm: 'column', initHead: 0, expectHead: 270, expectForm: 'column', expectGuide: 1 },
        { type: 'CORPEN', label: 'CORPEN STBD 045', initForm: 'column', initHead: 0, expectHead: 45, expectForm: 'column', expectGuide: 1 },
        { type: 'CORPEN', label: 'CORPEN PORT 180', initForm: 'abreast', initHead: 90, expectHead: 270, expectForm: 'abreast', expectGuide: 1 },
        { type: 'CORPEN', label: 'CORPEN STBD 4ANS', initForm: 'column', initHead: 90, expectHead: 130, expectForm: 'column', expectGuide: 1 }, // Relative 4ANS = +40 degrees
        { type: 'CORPEN', label: 'CORPEN STBD 1ANS', initForm: 'abreast', initHead: 0, expectHead: 10, expectForm: 'abreast', expectGuide: 1 }, // Search CORPEN 1ANS = +10 degrees

        // FORM: relative bearing alignments alter, course/heading stays EXACTLY IDENTICAL
        { type: 'FORM', label: 'FORM 180', initForm: 'column', initHead: 90, expectHead: 90, expectForm: 'abreast', expectGuide: 1 },
        { type: 'FORM', label: 'FORM 090', initForm: 'abreast', initHead: 90, expectHead: 90, expectForm: 'column', expectGuide: 1 }
    ];

    // Toggle overrides
    overrideToggle.addEventListener('change', () => {
        if (overrideToggle.checked) {
            overrideLabel.classList.add('active');
            manualPlotterControls.style.display = 'block';
        } else {
            overrideLabel.classList.remove('active');
            manualPlotterControls.style.display = 'none';
        }
        updatePlotterStatus();
    });

    shipSelectBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            shipSelectBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedShipId = parseInt(btn.getAttribute('data-ship'));
            updatePlotterStatus();
        });
    });

    function showModal(title, text) {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalBody').innerHTML = text;
        document.getElementById('infoModal').style.display = 'flex';
    }

    window.closeModal = function() {
        document.getElementById('infoModal').style.display = 'none';
    }

    // Handles perfect canvas coordinate mapping factoring viewport resizing scaling
    function handleInputCoordinates(clientX, clientY) {
        const rect = canvas.getBoundingClientRect();
        
        // Exact viewport-to-canvas ratio mapping
        const x = (clientX - rect.left) * (canvas.width / rect.width);
        const y = (clientY - rect.top) * (canvas.height / rect.height);

        let targetId = plottedShips.length + 1;

        if (overrideToggle.checked) {
            targetId = selectedShipId;
            // Clear any previously existing ship matching this ID to overwrite position
            plottedShips = plottedShips.filter(s => s.id !== targetId);
        }

        if (!overrideToggle.checked && plottedShips.length >= maxShips) return;

        plottedShips.push({
            id: targetId,
            x: x,
            y: y,
            heading: currentTask.initHead
        });

        // Automatically cycle selected ship forward to help speed up sequential manual plotting
        if (overrideToggle.checked) {
            let nextIndex = (targetId % 4) + 1;
            shipSelectBtns.forEach(btn => {
                if (parseInt(btn.getAttribute('data-ship')) === nextIndex) {
                    btn.click();
                }
            });
        }

        renderPlotter();
        updatePlotterStatus();
    }

    canvas.addEventListener('mousedown', (e) => {
        handleInputCoordinates(e.clientX, e.clientY);
    });

    canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            e.preventDefault();
            handleInputCoordinates(e.touches[0].clientX, e.touches[0].clientY);
        }
    }, { passive: false });

    function generateScenario() {
        feedbackBox.style.display = "none";
        nextBtn.style.display = "none";
        submitBtn.style.display = "block";
        evalForm.reset();
        
        plottedShips = [];
        selectedShipId = 1;
        shipSelectBtns.forEach(b => b.classList.remove('active'));
        shipSelectBtns[0].classList.add('active');

        currentTask = testDirectives[Math.floor(Math.random() * testDirectives.length)];
        
        document.getElementById('missionDesc').textContent = `Plot 4 ships starting in a ${currentTask.initForm.toUpperCase()} heading ${String(currentTask.initHead).padStart(3, '0')}°T. Plot Ship 1 (Guide) first.`;
        document.getElementById('signalText').textContent = currentTask.label;
        document.getElementById('maneuverType').textContent = currentTask.type;
        
        updatePlotterStatus();
        renderPlotter();
    }

    function updatePlotterStatus() {
        if (plottedShips.length < maxShips) {
            let lookingFor = overrideToggle.checked ? selectedShipId : (plottedShips.length + 1);
            statusText.innerHTML = `<span>Plotting order: <b>Ship ${lookingFor}</b></span>`;
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.5";
        } else {
            statusText.innerHTML = `<span style="color: var(--success)">Fleet plotted. Predict maneuver outcome.</span>`;
            submitBtn.disabled = false;
            submitBtn.style.opacity = "1";
        }
    }

    clearBtn.addEventListener('click', () => {
        plottedShips = [];
        renderPlotter();
        updatePlotterStatus();
    });

    function renderPlotter() {
        ctx.clearRect(0, 0, 600, 600);

        // Grid range circles
        ctx.strokeStyle = '#1e294b';
        ctx.lineWidth = 1;
        for(let r = 60; r <= radius; r += 60) {
            ctx.beginPath();
            ctx.arc(center, center, r, 0, Math.PI * 2);
            ctx.stroke();
        }

        // Radar dial ring
        ctx.beginPath();
        ctx.arc(center, center, radius, 0, Math.PI * 2);
        ctx.strokeStyle = '#2d3e72';
        ctx.lineWidth = 2.5;
        ctx.stroke();

        // Compass degree indicators
        ctx.fillStyle = '#475569';
        ctx.font = 'bold 12px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        cardinalBearings.forEach(angle => {
            let rad = (angle - 90) * Math.PI / 180;
            let x = center + (radius + 20) * Math.cos(rad);
            let y = center + (radius + 20) * Math.sin(rad);
            ctx.fillText(String(angle).padStart(3, '0'), x, y);
        });

        // Drawing hulls
        plottedShips.forEach(ship => {
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate((ship.heading - 90) * Math.PI / 180);

            ctx.fillStyle = ship.id === 1 ? '#f59e0b' : '#38bdf8';
            ctx.beginPath();
            ctx.moveTo(15, 0);       
            ctx.lineTo(-7, -8);     
            ctx.lineTo(-11, 0);     
            ctx.lineTo(-7, 8);      
            ctx.closePath();
            ctx.fill();

            if (ship.id === 1) {
                ctx.strokeStyle = 'rgba(245, 158, 11, 0.5)';
                ctx.lineWidth = 2.5;
                ctx.beginPath();
                ctx.arc(0, 0, 18, 0, Math.PI * 2);
                ctx.stroke();
            }

            ctx.rotate(-(ship.heading - 90) * Math.PI / 180);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 11px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(ship.id, 0, -22);
            ctx.restore();
        });
    }

    // Mathematical verification of starting plot alignment
    function verifyPlottedFormation() {
        if (plottedShips.length < maxShips) return false;

        const sorted = [...plottedShips].sort((a,b) => a.id - b.id);
        const dx = sorted[maxShips - 1].x - sorted[0].x;
        const dy = sorted[maxShips - 1].y - sorted[0].y;
        
        let plottedDeg = (Math.atan2(dy, dx) * 180 / Math.PI + 360) % 360;
        let truePlottedBearing = (plottedDeg + 90) % 360;

        const expectedBaseHeading = currentTask.initHead;
        let expectedLineBearing = (currentTask.initForm === 'column') ? expectedBaseHeading : (expectedBaseHeading + 90) % 180;

        let diff = Math.abs((truePlottedBearing % 180) - (expectedLineBearing % 180));
        if (diff > 90) diff = 180 - diff;

        return diff <= 32; 
    }

    evalForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const userHeading = parseInt(document.getElementById('ansHeading').value);
        const userForm = document.getElementById('ansFormation').value;
        const userGuide = parseInt(document.getElementById('ansGuide').value);

        let pass = true;
        let auditTrail = [];

        // 1. Check Initial Layout Drawing accuracy
        if (!verifyPlottedFormation()) {
            pass = false;
            auditTrail.push(`❌ <b>Initial Plotting Discrepancy:</b> Your plotted coordinate points do not align with a ${currentTask.initForm.toUpperCase()} heading ${currentTask.initHead}°T.`);
        } else {
            auditTrail.push(`&nbsp; Initial layout coordinates verified.`);
        }

        // 2. Predict Destination Course
        if (userHeading !== currentTask.expectHead) {
            pass = false;
            if (currentTask.type === 'FORM') {
                auditTrail.push(`❌ <b>Heading Deviation:</b> Predicted heading is incorrect. Under ATP-01 rules, <b>FORM</b> signals adjust relative geometry positions but leave the actual ship heading completely unaltered.`);
            } else {
                auditTrail.push(`❌ <b>Heading Deviation:</b> Target heading is ${currentTask.expectHead}°T.`);
            }
        } else {
            auditTrail.push(`&nbsp; Post-Maneuver Fleet Heading verified.`);
        }

        // 3. Predict Formation style outcome
        if (userForm !== currentTask.expectForm) {
            pass = false;
            if (currentTask.type === 'CORPEN') {
                auditTrail.push(`❌ <b>Formation Style Error:</b> Under ATP-01 rules, <b>CORPEN</b> maneuvers wheel the fleet course but explicitly preserve the relative formation layout style (${currentTask.expectForm.toUpperCase()}).`);
            } else if (currentTask.type === 'TURN') {
                auditTrail.push(`❌ <b>Formation Style Error:</b> Under ATP-01 rules, a <b>TURN</b> causes all ships to pivot simultaneously, rotating the structural style into a ${currentTask.expectForm.toUpperCase()} relative to the new heading.`);
            } else {
                auditTrail.push(`❌ <b>Formation Style Error:</b> Geometry change requires a ${currentTask.expectForm.toUpperCase()} layout.`);
            }
        } else {
            auditTrail.push(`&nbsp; Relative Formation Style verified.`);
        }

        // 4. Verify Post-Maneuver Guide Designation
        if (userGuide !== currentTask.expectGuide) {
            pass = false;
            auditTrail.push(`❌ <b>Guide Assignment Deviation:</b> Post-maneuver tactical guide remains Ship ${currentTask.expectGuide}.`);
        } else {
            auditTrail.push(`&nbsp; Operational Guide verified.`);
        }

        totalAttempts++;
        if (pass) successfulAttempts++;
        
        showModal(pass ? "Maneuver Verified" : "Maneuver Deficiencies Identified", pass ? "Solutions comply with ATP-01 Vol II signaling specifications." : "Review tactical review panel diagnostics below.");

        scoreDisplay.textContent = `SCORE: ${successfulAttempts}/${totalAttempts}`;
        feedbackBox.className = "feedback-box " + (pass ? "pass" : "fail");
        feedbackBox.innerHTML = `<b>TACTICAL AUDIT DIALOG:</b><br><br>` + auditTrail.join("<br>");
        feedbackBox.style.display = "block";

        // Redraw into final vector outcomes based on maneuver rules
        let spacing = 45;
        let rad = (currentTask.expectHead - 90) * Math.PI / 180;
        let sorted = [...plottedShips].sort((a,b) => a.id - b.id);

        sorted.forEach((ship, idx) => {
            ship.heading = currentTask.expectHead;
            if (idx > 0) {
                let offset = (currentTask.expectForm === 'abreast') ? Math.PI / 2 : 0;
                ship.x = sorted[0].x + Math.cos(rad + offset) * (idx * spacing);
                ship.y = sorted[0].y + Math.sin(rad + offset) * (idx * spacing);
            }
        });
        plottedShips = sorted;
        renderPlotter();

        submitBtn.style.display = "none";
        nextBtn.style.display = "block";
    });

    nextBtn.addEventListener('click', generateScenario);
    window.onload = generateScenario;
</script>

</body>
</html>
