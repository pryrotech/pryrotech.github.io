<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATP-01 Vol II Two-Phase Tactical Plotter</title>
    <style>
        :root {
            --bg-space: #030712;
            --panel-bg: #0b1120;
            --border-color: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --primary: #38bdf8;
            --primary-glow: rgba(56, 189, 248, 0.15);
            --guide-color: #f59e0b;
            --success: #10b981;
            --error: #ef4444;
            --accent: #a855f7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-space);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 16px;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Tactical Plotting Box */
        .plotter-panel {
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            padding: 60px 16px 80px 16px;
            flex: 1 1 480px;
            max-width: 540px;
            width: 100%;
        }

        .status-bar {
            position: absolute;
            top: 16px;
            left: 16px;
            right: 16px;
            color: var(--primary);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .phase-indicator {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--primary);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            color: var(--primary);
            white-space: nowrap;
        }

        .phase-indicator.predicting {
            background: rgba(168, 85, 247, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        .canvas-container {
            position: relative;
            width: 100%;
            max-width: 440px;
            aspect-ratio: 1 / 1;
            background: radial-gradient(circle, #0f172a 0%, #030712 100%);
            border-radius: 50%;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            touch-action: none;
            cursor: crosshair;
        }

        /* Control Form Panel */
        .control-panel-form {
            background-color: var(--panel-bg);
            border: 2px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            flex: 1 1 400px;
            max-width: 500px;
            width: 100%;
        }

        h2 {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-tracker {
            font-size: 0.85rem;
            color: var(--guide-color);
            font-family: monospace;
        }

        .mission-box {
            background-color: rgba(56, 189, 248, 0.03);
            border: 1px dashed var(--primary);
            border-radius: 10px;
            padding: 14px;
        }

        .mission-signal {
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--guide-color);
            margin-top: 8px;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .maneuver-badge {
            font-size: 0.7rem;
            padding: 3px 6px;
            border-radius: 4px;
            background: rgba(168, 85, 247, 0.2);
            color: var(--accent);
            border: 1px solid var(--accent);
            text-transform: uppercase;
        }

        .setup-config {
            background-color: rgba(255, 255, 255, 0.01);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .override-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .override-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .override-toggle.active {
            color: var(--primary);
        }

        .override-toggle input {
            cursor: pointer;
        }

        .ship-selector-btn-group {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }

        .ship-select-btn {
            background-color: var(--bg-space);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 4px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .ship-select-btn.active {
            border-color: var(--primary);
            color: var(--primary);
            background-color: var(--primary-glow);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        select, input[type="number"] {
            width: 100%;
            background-color: var(--bg-space);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        select:focus, input[type="number"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 8px var(--primary-glow);
        }

        .btn-action {
            background-color: var(--primary);
            color: var(--bg-space);
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            min-height: 44px;
        }

        .btn-action:hover {
            background-color: #5cd0ff;
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.3);
        }

        .btn-inline-clear {
            position: absolute;
            bottom: 15px;
            left: 16px;
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid var(--error);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
        }

        .btn-inline-clear:hover {
            background: var(--error);
            color: #ffffff;
        }

        .btn-phase-lock {
            position: absolute;
            bottom: 15px;
            right: 16px;
            background-color: var(--primary);
            color: var(--bg-space);
            border: none;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            z-index: 10;
            transition: all 0.2s;
        }

        .btn-phase-lock:hover {
            background-color: #5cd0ff;
        }

        .feedback-box {
            border-radius: 10px;
            padding: 14px;
            font-size: 0.8rem;
            display: none;
            line-height: 1.4;
            background: rgba(255,255,255,0.01);
            border: 1px solid var(--border-color);
        }

        .feedback-box.pass {
            display: block;
            background-color: rgba(16, 185, 129, 0.08);
            border-color: var(--success);
            color: #d1fae5;
        }

        .feedback-box.fail {
            display: block;
            background-color: rgba(239, 68, 68, 0.08);
            border-color: var(--error);
            color: #fee2e2;
        }

        .modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(3, 7, 18, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-content {
            background: var(--panel-bg);
            border: 2px solid var(--border-color);
            padding: 24px;
            border-radius: 16px;
            max-width: 440px;
            width: 100%;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
        }

        .btn-modal {
            background-color: var(--primary);
            color: var(--bg-space);
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.85rem;
        }

        @media (max-width: 550px) {
            .plotter-panel {
                padding-top: 50px;
                padding-bottom: 70px;
            }
            .canvas-container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="plotter-panel">
        <div class="status-bar">
            <span id="plotterStatus">Plotting Setup...</span>
            <span class="phase-indicator" id="phaseIndicator">Step 1: Initial Plot</span>
        </div>
        <div class="canvas-container" id="canvasContainer">
            <canvas id="tacticalCanvas" width="600" height="600"></canvas>
        </div>
        <button type="button" class="btn-inline-clear" id="clearBtn">Clear Step</button>
        <button type="button" class="btn-phase-lock" id="phaseLockBtn" style="display: none;">Lock & Plot Prediction</button>
    </div>

    <form class="control-panel-form" id="evalForm">
        <h2>
            Tactical Maneuver Plotter
            <span class="score-tracker" id="scoreDisplay">SCORE: 0/0</span>
        </h2>
        
        <div class="mission-box">
            <label>ATP-01 Tactical Order</label>
            <div style="font-size: 0.85rem; color: var(--text-main); margin-top: 4px; line-height: 1.4;" id="missionDesc">Generating Tactical Order...</div>
            <div class="mission-signal" id="missionSignal">
                <span id="signalText">--- ---</span>
                <span class="maneuver-badge" id="maneuverType">INIT</span>
            </div>
        </div>

        <div class="setup-config">
            <div class="override-row">
                <label>Plotting Options</label>
                <div class="override-toggle" id="overrideLabel">
                    <input type="checkbox" id="overrideToggle">
                    <span id="toggleText">Manual Override</span>
                </div>
            </div>
            
            <div class="form-group" id="manualPlotterControls" style="display: none;">
                <label>Active Hull Assignment</label>
                <div class="ship-selector-btn-group">
                    <button type="button" class="ship-select-btn active" data-ship="1">Ship 1 (Lead)</button>
                    <button type="button" class="ship-select-btn" data-ship="2">Ship 2</button>
                    <button type="button" class="ship-select-btn" data-ship="3">Ship 3</button>
                    <button type="button" class="ship-select-btn" data-ship="4">Ship 4</button>
                </div>
            </div>
        </div>

        <hr style="border-color: var(--border-color);">

        <div class="form-group">
            <label for="ansHeading">Predicted Post-Maneuver Heading (°T)</label>
            <input type="number" id="ansHeading" name="ansHeading" min="0" max="359" placeholder="e.g. 090" required>
        </div>

        <div class="form-group">
            <label for="ansFormation">Predicted Final Formation Style</label>
            <select id="ansFormation" name="ansFormation" required>
                <option value="">-- Select Layout --</option>
                <option value="column">Column (Line Ahead)</option>
                <option value="abreast">Line Abreast (Side-by-Side)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="ansGuide">Which Ship is the Post-Maneuver Guide?</label>
            <select id="ansGuide" name="ansGuide" required>
                <option value="">-- Select Hull Identifier --</option>
                <option value="1">Ship 1 (Lead)</option>
                <option value="2">Ship 2</option>
                <option value="3">Ship 3</option>
                <option value="4">Ship 4</option>
            </select>
        </div>

        <div class="feedback-box" id="feedbackBox"></div>

        <button type="submit" class="btn-action" id="submitBtn" disabled style="opacity: 0.5;">Submit Solutions for Review</button>
        <button type="button" class="btn-action" id="nextBtn" style="background-color: var(--panel-bg); color: var(--primary); border: 1px solid var(--primary); display:none;">Generate Next Problem</button>
    </form>
</div>

<div class="modal" id="infoModal">
    <div class="modal-content">
        <h3 id="modalTitle">Plotting Evaluation</h3>
        <p id="modalBody" style="margin: 15px 0 25px 0; line-height: 1.5; color: var(--text-muted);"></p>
        <button type="button" class="btn-modal" onclick="closeModal()">Acknowledge</button>
    </div>
</div>

        { type: 'TURN', label: 'TURN STBD 45', initForm: 'abreast', initHead: 0, expectHead: 45, expectForm: 'abreast', expectGuide: 1 },
        { type: 'CORPEN', label: 'CORPEN STBD 090', initForm: 'abreast', initHead: 0, expectHead: 90, expectForm: 'abreast', expectGuide: 1 },
        { type: 'CORPEN', label: 'CORPEN PORT 45', initForm: 'abreast', initHead: 0, expectHead: 315, expectForm: 'abreast', expectGuide: 1 },
        { type: 'CORPEN', label: 'CORPEN STBD 3ANS', initForm: 'abreast', initHead: 0, expectHead: 30, expectForm: 'abreast', expectGuide: 1 },
        { type: 'FORM', label: 'FORM 090', initForm: 'abreast', initHead: 0, expectHead: 0, expectForm: 'column', expectGuide: 1 },
        { type: 'FORM', label: 'FORM 180', initForm: 'abreast', initHead: 0, expectHead: 0, expectForm: 'abreast', expectGuide: 1 },

        // --- 10. LINE ABREAST START DIRECTIVES (Group J: Heading 090°/East) ---
        { type: 'TURN', label: 'TURN PORT 090', initForm: 'abreast', initHead: 90, expectHead: 0, expectForm: 'column', expectGuide: 1 },
        { type: 'TURN', label: 'TURN STBD 090', initForm: 'abreast', initHead: 90, expectHead: 180, expectForm: 'column', expectGuide: 1 },
        { type: 'TURN', label: 'TURN PORT 45', initForm: 'abreast', initHead: 90, expectHead: 45, expectForm: 'abreast', expectGuide: 1 },
        { type: 'CORPEN', label: 'CORPEN STBD 180', initForm: 'abreast', initHead: 90, expectHead: 180, expectForm: 'abreast', expectGuide: 1 },
        { type: 'CORPEN', label: 'CORPEN PORT 2ANS', initForm: 'abreast', initHead: 90, expectHead: 70, expectForm: 'abreast', expectGuide: 1 },
        { type: 'FORM', label: 'FORM 180', initForm: 'abreast', initHead: 90, expectHead: 90, expectForm: 'column', expectGuide: 1 },

        // --- 11. LINE ABREAST START DIRECTIVES (Group K: Heading 180°/South) ---
        { type: 'TURN', label: 'TURN PORT 090', initForm: 'abreast', initHead: 180, expectHead: 90, expectForm: 'column', expectGuide: 1 },
        { type: 'TURN', label: 'TURN STBD 090', initForm: 'abreast', initHead: 180, expectHead: 270, expectForm: 'column', expectGuide: 1 },
        { type: 'CORPEN', label: 'CORPEN PORT 090', initForm: 'abreast', initHead: 180, expectHead: 90, expectForm: 'abreast', expectGuide: 1 },
        { type: 'CORPEN', label: 'CORPEN STBD 1ANS', initForm: 'abreast', initHead: 180, expectHead: 190, expectForm: 'abreast', expectGuide: 1 },
        { type: 'CORPEN', label: 'CORPEN STBD 45', initForm: 'abreast', initHead: 180, expectHead: 225, expectForm: 'abreast', expectGuide: 1 },
        { type: 'FORM', label: 'FORM 270', initForm: 'abreast', initHead: 180, expectHead: 180, expectForm: 'column', expectGuide: 1 },

        // --- 12. LINE ABREAST START DIRECTIVES (Group L: Heading 270°/West) ---
        { type: 'TURN', label: 'TURN PORT 090', initForm: 'abreast', initHead: 270, expectHead: 180, expectForm: 'column', expectGuide: 1 },
        { type: 'TURN', label: 'TURN STBD 090', initForm: 'abreast', initHead: 270, expectHead: 0, expectForm: 'column', expectGuide: 1 },
        { type: 'CORPEN', label: 'CORPEN PORT 4ANS', initForm: 'abreast', initHead: 270, expectHead: 230, expectForm: 'abreast', expectGuide: 1 },
        { type: 'CORPEN', label: 'CORPEN PORT 45', initForm: 'abreast', initHead: 270, expectHead: 225, expectForm: 'abreast', expectGuide: 1 },
        { type: 'FORM', label: 'FORM 360', initForm: 'abreast', initHead: 270, expectHead: 270, expectForm: 'column', expectGuide: 1 }
    ];

    overrideToggle.addEventListener('change', () => {
        if (overrideToggle.checked) {
            overrideLabel.classList.add('active');
            manualPlotterControls.style.display = 'block';
        } else {
            overrideLabel.classList.remove('active');
            manualPlotterControls.style.display = 'none';
        }
        updatePlotterStatus();
    });

    shipSelectBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            shipSelectBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedShipId = parseInt(btn.getAttribute('data-ship'));
            updatePlotterStatus();
        });
    });

    function showModal(title, text) {
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('modalBody').innerHTML = text;
        document.getElementById('infoModal').style.display = 'flex';
    }

    window.closeModal = function() {
        document.getElementById('infoModal').style.display = 'none';
    }

    function handleInputCoordinates(clientX, clientY) {
        if (activePhase === 'review') return;

        const rect = canvas.getBoundingClientRect();
        const x = (clientX - rect.left) * (canvas.width / rect.width);
        const y = (clientY - rect.top) * (canvas.height / rect.height);

        let targetList = (activePhase === 'initial') ? initialShips : predictedShips;
        let targetId = targetList.length + 1;

        if (overrideToggle.checked) {
            targetId = selectedShipId;
            if (activePhase === 'initial') {
                initialShips = initialShips.filter(s => s.id !== targetId);
            } else {
                predictedShips = predictedShips.filter(s => s.id !== targetId);
            }
        }

        if (!overrideToggle.checked && targetList.length >= maxShips) return;

        let activeShipsList = (activePhase === 'initial') ? initialShips : predictedShips;
        activeShipsList.push({
            id: targetId,
            x: x,
            y: y,
            heading: (activePhase === 'initial') ? currentTask.initHead : currentTask.expectHead
        });

        if (overrideToggle.checked) {
            let nextIndex = (targetId % 4) + 1;
            shipSelectBtns.forEach(btn => {
                if (parseInt(btn.getAttribute('data-ship')) === nextIndex) {
                    btn.click();
                }
            });
        }

        renderPlotter();
        updatePlotterStatus();
    }

    canvas.addEventListener('mousedown', (e) => handleInputCoordinates(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            e.preventDefault();
            handleInputCoordinates(e.touches[0].clientX, e.touches[0].clientY);
        }
    }, { passive: false });

    phaseLockBtn.addEventListener('click', () => {
        if (activePhase === 'initial' && initialShips.length === maxShips) {
            activePhase = 'predicted';
            phaseIndicator.textContent = "Step 2: Plot Prediction";
            phaseIndicator.classList.add('predicting');
            phaseLockBtn.style.display = 'none';
            selectedShipId = 1;
            shipSelectBtns[0].click();
            updatePlotterStatus();
            renderPlotter();
        }
    });

    function generateScenario() {
        feedbackBox.style.display = "none";
        nextBtn.style.display = "none";
        submitBtn.style.display = "block";
        phaseLockBtn.style.display = 'none';
        evalForm.reset();
        
        initialShips = [];
        predictedShips = [];
        activePhase = 'initial';
        selectedShipId = 1;
        
        phaseIndicator.textContent = "Step 1: Initial Plot";
        phaseIndicator.classList.remove('predicting');
        
        shipSelectBtns.forEach(b => b.classList.remove('active'));
        shipSelectBtns[0].classList.add('active');

        currentTask = testDirectives[Math.floor(Math.random() * testDirectives.length)];
        
        document.getElementById('missionDesc').textContent = `1. Plot the initial ${currentTask.initForm.toUpperCase()} layout heading ${String(currentTask.initHead).padStart(3, '0')}°T.\n2. Lock phase, then plot your final predicted locations.`;
        document.getElementById('signalText').textContent = currentTask.label;
        document.getElementById('maneuverType').textContent = currentTask.type;
        
        updatePlotterStatus();
        renderPlotter();
    }

    function updatePlotterStatus() {
        if (activePhase === 'initial') {
            if (initialShips.length < maxShips) {
                let lookingFor = overrideToggle.checked ? selectedShipId : (initialShips.length + 1);
                statusText.innerHTML = `<span>Plot Initial: <b>Ship ${lookingFor}</b></span>`;
                phaseLockBtn.style.display = 'none';
            } else {
                statusText.innerHTML = `<span style="color: var(--primary)">Setup plotted. Lock and proceed.</span>`;
                phaseLockBtn.style.display = 'inline-block';
            }
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.5";
        } else if (activePhase === 'predicted') {
            if (predictedShips.length < maxShips) {
                let lookingFor = overrideToggle.checked ? selectedShipId : (predictedShips.length + 1);
                statusText.innerHTML = `<span>Plot Prediction: <b>Ship ${lookingFor}</b></span>`;
                submitBtn.disabled = true;
                submitBtn.style.opacity = "0.5";
            } else {
                statusText.innerHTML = `<span style="color: var(--success)">Prediction ready. Submit solutions.</span>`;
                submitBtn.disabled = false;
                submitBtn.style.opacity = "1";
            }
        } else {
            statusText.innerHTML = `<span style="color: var(--accent)">Review Phase.</span>`;
            submitBtn.disabled = true;
            submitBtn.style.opacity = "0.5";
        }
    }

    clearBtn.addEventListener('click', () => {
        if (activePhase === 'initial') {
            initialShips = [];
        } else if (activePhase === 'predicted') {
            predictedShips = [];
        }
        renderPlotter();
        updatePlotterStatus();
    });

    function drawTacticalGuideLine(baseShip, formationStyle, headingValue, color) {
        if (!baseShip) return;
        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = 1.5;
        ctx.setLineDash([5, 8]);
        
        // Under ATP-01 rules, columns align directly with base heading, abreast aligns perpendicular
        let angleDeg = (formationStyle === 'column') ? headingValue : (headingValue + 90) % 360;
        let rad = (angleDeg - 90) * Math.PI / 180;
        
        // Draw standard bidirectional guidelines along the alignment axis
        ctx.beginPath();
        ctx.moveTo(baseShip.x - Math.cos(rad) * 300, baseShip.y - Math.sin(rad) * 300);
        ctx.lineTo(baseShip.x + Math.cos(rad) * 300, baseShip.y + Math.sin(rad) * 300);
        ctx.stroke();
        ctx.restore();
    }

    function renderPlotter() {
        ctx.clearRect(0, 0, 600, 600);

        ctx.strokeStyle = '#1e293b';
        ctx.lineWidth = 1;
        for(let r = 60; r <= radius; r += 60) {
            ctx.beginPath();
            ctx.arc(center, center, r, 0, Math.PI * 2);
            ctx.stroke();
        }

        ctx.beginPath();
        ctx.arc(center, center, radius, 0, Math.PI * 2);
        ctx.strokeStyle = '#2d3e72';
        ctx.lineWidth = 2.5;
        ctx.stroke();

        ctx.fillStyle = '#475569';
        ctx.font = 'bold 12px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        cardinalBearings.forEach(angle => {
            let rad = (angle - 90) * Math.PI / 180;
            let x = center + (radius + 20) * Math.cos(rad);
            let y = center + (radius + 20) * Math.sin(rad);
            ctx.fillText(String(angle).padStart(3, '0'), x, y);
        });

        // Smart Guide Vector Projection: Projects a line showing the exact axis path expected
        if (activePhase === 'initial' && initialShips.length > 0) {
            let leadShip = initialShips.find(s => s.id === 1) || initialShips[0];
            drawTacticalGuideLine(leadShip, currentTask.initForm, currentTask.initHead, 'rgba(56, 189, 248, 0.25)');
        } else if (activePhase === 'predicted' && predictedShips.length > 0) {
            let leadShip = predictedShips.find(s => s.id === 1) || predictedShips[0];
            drawTacticalGuideLine(leadShip, currentTask.expectForm, currentTask.expectHead, 'rgba(168, 85, 247, 0.25)');
        }

        initialShips.forEach(ship => {
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate((ship.heading - 90) * Math.PI / 180);

            if (activePhase !== 'initial') {
                ctx.strokeStyle = 'rgba(148, 163, 184, 0.25)';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(15, 0); ctx.lineTo(-7, -8); ctx.lineTo(-11, 0); ctx.lineTo(-7, 8); ctx.closePath();
                ctx.stroke();
            } else {
                ctx.fillStyle = ship.id === 1 ? '#f59e0b' : '#38bdf8';
                ctx.beginPath();
                ctx.moveTo(15, 0); ctx.lineTo(-7, -8); ctx.lineTo(-11, 0); ctx.lineTo(-7, 8); ctx.closePath();
                ctx.fill();
                if (ship.id === 1) {
                    ctx.strokeStyle = 'rgba(245, 158, 11, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(0, 0, 18, 0, Math.PI * 2); ctx.stroke();
                }
            }

            ctx.rotate(-(ship.heading - 90) * Math.PI / 180);
            ctx.fillStyle = (activePhase !== 'initial') ? 'rgba(148, 163, 184, 0.25)' : '#ffffff';
            ctx.font = 'bold 10px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(ship.id, 0, -22);
            ctx.restore();
        });

        predictedShips.forEach(ship => {
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate((ship.heading - 90) * Math.PI / 180);

            if (activePhase === 'review') {
                ctx.strokeStyle = 'rgba(168, 85, 247, 0.6)';
                ctx.lineWidth = 2;
                ctx.setLineDash([4, 4]);
                ctx.beginPath();
                ctx.moveTo(15, 0); ctx.lineTo(-7, -8); ctx.lineTo(-11, 0); ctx.lineTo(-7, 8); ctx.closePath();
                ctx.stroke();
                ctx.setLineDash([]);
            } else {
                ctx.fillStyle = ship.id === 1 ? '#e11d48' : '#a855f7';
                ctx.beginPath();
                ctx.moveTo(15, 0); ctx.lineTo(-7, -8); ctx.lineTo(-11, 0); ctx.lineTo(-7, 8); ctx.closePath();
                ctx.fill();
            }

            ctx.rotate(-(ship.heading - 90) * Math.PI / 180);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 10px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(`P${ship.id}`, 0, -22);
            ctx.restore();
        });

        if (activePhase === 'review') {
            let correctSolution = getTacticalCorrectPositions();
            correctSolution.forEach(ship => {
                ctx.save();
                ctx.translate(ship.x, ship.y);
                ctx.rotate((ship.heading - 90) * Math.PI / 180);

                ctx.fillStyle = 'rgba(16, 185, 129, 0.85)';
                ctx.beginPath();
                ctx.moveTo(15, 0); ctx.lineTo(-7, -8); ctx.lineTo(-11, 0); ctx.lineTo(-7, 8); ctx.closePath();
                ctx.fill();

                ctx.rotate(-(ship.heading - 90) * Math.PI / 180);
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 10px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`✔${ship.id}`, 0, -22);
                ctx.restore();
            });
        }
    }

    function getTacticalCorrectPositions() {
        if (initialShips.length < maxShips) return [];
        let spacing = 45;
        let rad = (currentTask.expectHead - 90) * Math.PI / 180;
        let sortedInit = [...initialShips].sort((a,b) => a.id - b.id);
        
        let correctShips = JSON.parse(JSON.stringify(sortedInit));

        correctShips.forEach((ship, idx) => {
            ship.heading = currentTask.expectHead;
            if (idx > 0) {
                let offset = (currentTask.expectForm === 'abreast') ? Math.PI / 2 : 0;
                ship.x = correctShips[0].x + Math.cos(rad + offset) * (idx * spacing);
                ship.y = correctShips[0].y + Math.sin(rad + offset) * (idx * spacing);
            }
        });
        return correctShips;
    }

    // Mathematical verification with massive alignment tolerance (75°) and smart distance sorting
    function verifyFormationArray(shipsList, expectedForm, expectedHeading) {
        if (shipsList.length < maxShips) return false;

        // Sort by spatial coordinates along alignment vector rather than arbitrary input order
        let alignmentAngle = (expectedForm === 'column') ? expectedHeading : (expectedHeading + 90) % 360;
        let rad = (alignmentAngle - 90) * Math.PI / 180;
        
        // Project coordinates onto the expected unit vector to reliably find the terminal coordinates
        const sorted = [...shipsList].sort((a, b) => {
            let projectionA = a.x * Math.cos(rad) + a.y * Math.sin(rad);
            let projectionB = b.x * Math.cos(rad) + b.y * Math.sin(rad);
            return projectionA - projectionB;
        });

        const dx = sorted[maxShips - 1].x - sorted[0].x;
        const dy = sorted[maxShips - 1].y - sorted[0].y;
        
        // Simple sanity check: user must show a general line spread
        let spreadDistance = Math.sqrt(dx*dx + dy*dy);
        if (spreadDistance < 40) return false; // Rejected if grouped on a single point

        let plottedDeg = (Math.atan2(dy, dx) * 180 / Math.PI + 360) % 360;
        let truePlottedBearing = (plottedDeg + 90) % 360;

        let expectedLineBearing = (expectedForm === 'column') ? expectedHeading : (expectedHeading + 90) % 180;

        let diff = Math.abs((truePlottedBearing % 180) - (expectedLineBearing % 180));
        if (diff > 90) diff = 180 - diff;

        // Extremely generous tolerance of 75 degrees! 
        // Ensures anything representing the correct axis quadrant passes.
        return diff <= 75; 
    }

    evalForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const userHeading = parseInt(document.getElementById('ansHeading').value);
        const userForm = document.getElementById('ansFormation').value;
        const userGuide = parseInt(document.getElementById('ansGuide').value);

        let pass = true;
        let auditTrail = [];

        if (!verifyFormationArray(initialShips, currentTask.initForm, currentTask.initHead)) {
            pass = false;
            auditTrail.push(`❌ <b>Initial Plot:</b> Setup alignment deviates too far from the expected ${currentTask.initForm.toUpperCase()} orientation on course ${currentTask.initHead}°T.`);
        } else {
            auditTrail.push(`&nbsp; Initial configuration coordinates verified.`);
        }

        if (!verifyFormationArray(predictedShips, currentTask.expectForm, currentTask.expectHead)) {
            pass = false;
            auditTrail.push(`❌ <b>Prediction Plot:</b> Prediction alignment deviates too far from the expected ${currentTask.expectForm.toUpperCase()} orientation on course ${currentTask.expectHead}°T.`);
        } else {
            auditTrail.push(`&nbsp; Predicted coordinates verified.`);
        }

        if (userHeading !== currentTask.expectHead) {
            pass = false;
            if (currentTask.type === 'FORM') {
                auditTrail.push(`❌ <b>Heading Predictor:</b> Incorrect. Under ATP-01 guidelines, <b>FORM</b> commands modify layout structures but leave base steering headings completely unchanged.`);
            } else {
                auditTrail.push(`❌ <b>Heading Predictor:</b> Final course outcome is ${currentTask.expectHead}°T.`);
            }
        } else {
            auditTrail.push(`&nbsp; Post-Maneuver Fleet Heading verified.`);
        }

        if (userForm !== currentTask.expectForm) {
            pass = false;
            if (currentTask.type === 'CORPEN') {
                auditTrail.push(`❌ <b>Formation Style Predictor:</b> Under ATP-01 guidelines, <b>CORPEN</b> maneuvers wheel the course but preserve the existing relative layout style (${currentTask.expectForm.toUpperCase()}).`);
            } else if (currentTask.type === 'TURN') {
                auditTrail.push(`❌ <b>Formation Style Predictor:</b> A simultaneous <b>TURN</b> causes all ships to pivot together, rotating the structural geometry into a ${currentTask.expectForm.toUpperCase()} layout.`);
            } else {
                auditTrail.push(`❌ <b>Formation Style Predictor:</b> Geometry changes require a ${currentTask.expectForm.toUpperCase()} layout.`);
            }
        } else {
            auditTrail.push(`&nbsp; Final Formation Layout matches.`);
        }

        if (userGuide !== currentTask.expectGuide) {
            pass = false;
            auditTrail.push(`❌ <b>Guide Predictor:</b> Post-maneuver tactical guide remains Ship ${currentTask.expectGuide}.`);
        } else {
            auditTrail.push(`&nbsp; Operational Guide tracking verified.`);
        }

        totalAttempts++;
        if (pass) successfulAttempts++;
        
        activePhase = 'review';
        phaseIndicator.textContent = "Step 3: Review Logs";
        phaseIndicator.className = "phase-indicator";

        showModal(pass ? "Maneuver Flawlessly Solved" : "Tactical Discrepancy Flagged", pass ? "Both initial plotting configuration and predicted maneuvers were perfectly resolved." : "Check tactical logging feedback pane below for diagnostic corrections.");

        scoreDisplay.textContent = `SCORE: ${successfulAttempts}/${totalAttempts}`;
        feedbackBox.className = "feedback-box " + (pass ? "pass" : "fail");
        feedbackBox.innerHTML = `<b>TACTICAL AUDIT ANALYSIS LOGS:</b><br><br>` + auditTrail.join("<br>") + `<br><br><span style="color: var(--primary)">* Correct ship target solutions are shown in <b>solid green hulls</b> on the board. Your prediction is drawn in <b>dashed purple lines</b>.</span>`;
        feedbackBox.style.display = "block";

        renderPlotter();
        updatePlotterStatus();

        submitBtn.style.display = "none";
        nextBtn.style.display = "block";
    });

    nextBtn.addEventListener('click', generateScenario);
    window.onload = generateScenario;
</script>
